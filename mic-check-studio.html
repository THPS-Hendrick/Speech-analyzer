<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Mic-Check Studio</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- NLP Engine (Compromise) -->
    <script src="https://unpkg.com/compromise@14.14.3/builds/compromise.min.js"></script>
    
    <!-- THPS NLP Scorer Engine -->
    <script src="https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/engines/nlp-scorer.js"></script>

    <!-- The Animated Gameboard Widget (Githack Absolute Path) -->
    <script src="https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/components/large/gameboard-animated.js?v=3"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- The Studio Canvas -->
    <div class="w-full max-w-[368px] mx-auto relative">
        <thps-gameboard-animated></thps-gameboard-animated>
    </div>

    <!-- The Engine (Vanilla JS) -->
    <script>
        // --- 0. INITIALIZATION ---
        window.onload = () => {
            // Pre-load the dictionaries silently in the background
            if (window.THPS && window.THPS.NLP && typeof window.THPS.NLP.loadDictionaries === 'function') {
                window.THPS.NLP.loadDictionaries();
            }
        };

        // --- 1. HARDWARE STATE ---
        let stream = null;
        let displayStream = null; 
        let mediaRecorder = null;
        let recordedVideoChunks = [];
        let fileExt = 'webm';
        
        let audioCtx = null;
        let sourceNode = null;
        let processorNode = null;
        let virtualDestNode = null; // NEW: The AudioContext Bridge Sink
        
        let audioBuffers = [];
        let totalSamplesRecorded = 0;
        let recordStartTime = 0;

        window.thps_isRecording = false;

        // --- 2. THE HARDWARE PIPELINE (WAV Encoding) ---
        function floatTo16BitPCM(output, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, input[i]));
                output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        }
        function encodeWAV(samples, sampleRate) {
            let buffer = new ArrayBuffer(44 + samples.length * 2);
            let view = new DataView(buffer);
            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt '); view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(view, 36, 'data'); view.setUint32(40, samples.length * 2, true);
            floatTo16BitPCM(view, 44, samples);
            return new Blob([view], { type: 'audio/wav' });
        }

        // --- 3. STUDIO EVENT LISTENERS (The 5-Step Creator Sequence) ---
        
        // STEP 1: Turn on Camera & Start Video Recording
        window.addEventListener('thps-studio-start-camera', async () => {
            const widget = document.querySelector('thps-gameboard-animated');
            const videoEl = widget.querySelector('#studio-video');
            const camOff = widget.querySelector('#studio-cam-off');
            const recDot = widget.querySelector('#studio-rec-dot');

            try {
                // 1. Request Webcam & Mic
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 } }, 
                    audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } 
                });

                // Wire UI
                videoEl.srcObject = stream;
                videoEl.classList.remove('hidden');
                camOff.classList.add('hidden');

                // 2. Request Screen Share (Video ONLY to prevent echo)
                try {
                    displayStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { preferCurrentTab: true },
                        audio: false
                    });
                } catch (displayErr) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                    videoEl.srcObject = null;
                    videoEl.classList.add('hidden');
                    camOff.classList.remove('hidden');
                    return; 
                }

                recDot.classList.remove('hidden');

                // 3. THE AUDIOCONTEXT BRIDGE (Fixes the Muted Export Bug)
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass({ sampleRate: 16000 });
                
                // Route raw mic -> Virtual Destination (strips hardware clock desyncs)
                sourceNode = audioCtx.createMediaStreamSource(stream);
                virtualDestNode = audioCtx.createMediaStreamDestination();
                sourceNode.connect(virtualDestNode);

                // 4. STITCH THEM TOGETHER (Screen Video + Virtual Synced Audio)
                const combinedStream = new MediaStream([
                    ...displayStream.getVideoTracks(),
                    ...virtualDestNode.stream.getAudioTracks()
                ]);

                // 5. Setup and Start Video Recorder
                fileExt = 'webm';
                let mimeType = 'video/webm;codecs=vp8,opus';

// Fallback to a generic webm container if vp8/opus specifically isn't supported
if (!MediaRecorder.isTypeSupported(mimeType)) {
    if (MediaRecorder.isTypeSupported('video/webm')) {
        mimeType = 'video/webm'; 
    } else {
        mimeType = ''; // Let the browser dictate its own default
    }
}
                
                mediaRecorder = new MediaRecorder(combinedStream, { mimeType });
                recordedVideoChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedVideoChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedVideoChunks, { type: mediaRecorder.mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `MicCheck_Studio_${new Date().toISOString().split('T')[0]}.${fileExt}`;
                    a.click();
                    URL.revokeObjectURL(url);
                };

                // Failsafe: If user clicks the browser's native "Stop Sharing" button early
                displayStream.getVideoTracks()[0].onended = () => {
                    if (window.thps_isRecording) {
                        window.dispatchEvent(new CustomEvent('thps-studio-stop-game', { bubbles: true, composed: true }));
                    } else if (mediaRecorder.state === "recording") {
                        window.dispatchEvent(new CustomEvent('thps-studio-save-video', { bubbles: true, composed: true }));
                    }
                };

                mediaRecorder.start();

                // Move UI to Phase 2
                widget.setGameState('CAMERA_ON');

            } catch (err) {
                console.error("Hardware Error:", err);
                alert("Camera, Microphone, and Screen Share access are strictly required for Studio Mode.");
            }
        });

        // STEP 2: Start Game (Connect Google AI to existing stream)
        window.addEventListener('thps-studio-start-game', () => {
            const widget = document.querySelector('thps-gameboard-animated');
            
            audioBuffers = [];
            totalSamplesRecorded = 0;
            recordStartTime = Date.now();
            
            // The AudioContext and sourceNode are already running from Phase 1!
            // We just plug the ScriptProcessor into the existing chain to capture chunks.
            processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
            
            processorNode.onaudioprocess = function(e) {
                if (!window.thps_isRecording) return;
                const channelData = e.inputBuffer.getChannelData(0);
                audioBuffers.push(new Float32Array(channelData));
                totalSamplesRecorded += channelData.length;
            };

            sourceNode.connect(processorNode);
            processorNode.connect(audioCtx.destination);

            window.thps_isRecording = true;
            widget.setGameState('PLAYING');
        });

        // STEP 3 & 4: Stop Game & Analyze (THE TRUE BRAIN)
        window.addEventListener('thps-studio-stop-game', () => {
            if (!window.thps_isRecording) return;
            window.thps_isRecording = false;
            
            const widget = document.querySelector('thps-gameboard-animated');
            widget.setGameState('ANALYZING');
            
            const elapsedSecs = (Date.now() - recordStartTime) / 1000;

            // DISCONNECT VERCEL PROCESSOR ONLY!
            // Do NOT disconnect sourceNode or audioCtx, otherwise the video export goes silent!
            if (processorNode) {
                processorNode.disconnect();
                processorNode = null;
            }

            let masterArray = new Float32Array(totalSamplesRecorded);
            let offset = 0;
            for(let i=0; i<audioBuffers.length; i++) {
                masterArray.set(audioBuffers[i], offset);
                offset += audioBuffers[i].length;
            }

            const wavBlob = encodeWAV(masterArray, 16000);
            const reader = new FileReader();
            reader.readAsDataURL(wavBlob);
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                try {
                    const res = await fetch('https://mic-check-backend.vercel.app/api/transcribe', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audioContent: b64, mimeType: 'audio/wav' })
                    });
                    
                    let transcript = "";
                    let wordTimestamps = [];
                    if (res.ok) {
                        const data = await res.json();
                        transcript = data.transcript || "";
                        wordTimestamps = data.words || [];
                    }
                    
                    if (!transcript.trim() || typeof window.THPS?.NLP?.analyzeTranscript !== 'function') {
                         window.dispatchEvent(new CustomEvent('thps-dashboard-update', { detail: { overrideGrade: true } }));
                         return;
                    }

                    // --- THE REAL NLP ENGINE MATH ---
                    const nlpData = window.THPS.NLP.analyzeTranscript(transcript, wordTimestamps);
                    const { numWords, numSentences, totalSyllables, letterCount, complexWordCount, personalCount, visualCount, simpleCounts } = nlpData;

                    // 1. Time & Pauses
                    const periods = (transcript.match(/[.!?]/g) || []).length;
                    const commas = (transcript.match(/[,;:-]/g) || []).length;
                    let estimatedPauseTime = (periods * 1.3) + (commas * 0.5);
                    const transcribedDuration = Math.min(90, elapsedSecs);
                    
                    let minAllowedPause = transcribedDuration * 0.10;
                    let maxAllowedPause = transcribedDuration * 0.40;
                    estimatedPauseTime = Math.max(minAllowedPause, Math.min(maxAllowedPause, estimatedPauseTime));
                    
                    const activeSpeakingSecs = transcribedDuration - estimatedPauseTime;
                    const pausePercent = (estimatedPauseTime / transcribedDuration) * 100;
                    
                    const avgWpm = Math.round((numWords / transcribedDuration) * 60);
                    const mumbleScore = activeSpeakingSecs > 0 ? (totalSyllables / activeSpeakingSecs) : 0;

                    // 2. Readability
                    let avgGrade = 0;
                    if (typeof window.THPS.NLP.calculateReadabilityMetrics === 'function') {
                         const readability = window.THPS.NLP.calculateReadabilityMetrics(numWords, numSentences, totalSyllables, letterCount, complexWordCount);
                         avgGrade = readability.avgGrade;
                    }

                    // 3. Percentages
                    const personalPercent = Math.round((personalCount / numWords) * 100);
                    const visualPercent = Math.round((visualCount / numWords) * 100);
                    const intangiblePercent = Math.max(0, 100 - personalPercent - visualPercent);
                    const avgWpsFloat = numSentences > 0 ? (numWords / numSentences) : 0;

                    let s5yrPct = Math.round((simpleCounts['5yr Old 1000'] / numWords) * 100) || 0;
                    let sEslPct = Math.round((simpleCounts['ESL 2000'] / numWords) * 100) || 0;
                    let sKitPct = Math.round((simpleCounts['Kitchen 1000'] / numWords) * 100) || 0;
                    const coreSimpleScore = s5yrPct + sEslPct + sKitPct;

                    // 4. THE 10-POINT GRADING SYSTEM
                    let totalPoints = 0;
                    let overrideGrade = false;

                    // Time Constraints
                    if (elapsedSecs < 20) overrideGrade = true; 
                    else if (elapsedSecs < 40) totalPoints += 0.25; 
                    else if (elapsedSecs < 60) totalPoints += 0.75; 
                    else if (elapsedSecs <= 90) totalPoints += 1.0; 
                    else overrideGrade = true;

                    // Delivery
                    if (avgWpm < 100) totalPoints += 0.75; 
                    else if (avgWpm > 150) totalPoints += 0.25; 
                    else totalPoints += 1;

                    if (mumbleScore < 3) totalPoints += 0.75; 
                    else if (mumbleScore > 5) totalPoints += 0.25; 
                    else totalPoints += 1;

                    if (pausePercent < 10) totalPoints += 0.25; 
                    else if (pausePercent > 30) totalPoints += 0.75; 
                    else totalPoints += 1;

                    // Content
                    if (personalPercent < 30) totalPoints += 0.25; 
                    else if (personalPercent > 60) totalPoints += 0.75; 
                    else totalPoints += 1;

                    if (visualPercent < 20) totalPoints += 0.25; 
                    else if (visualPercent > 50) totalPoints += 0.75; 
                    else totalPoints += 1;

                    if (intangiblePercent > 45) totalPoints += 0.25; 
                    else if (intangiblePercent >= 30) totalPoints += 0.75; 
                    else totalPoints += 1;

                    // Simplicity
                    if (avgWpsFloat < 5) totalPoints += 0.75; 
                    else if (avgWpsFloat > 15) totalPoints += 0.25; 
                    else totalPoints += 1;

                    if (avgGrade < 5) totalPoints += 0.75; 
                    else if (avgGrade > 10) totalPoints += 0.25; 
                    else totalPoints += 1;

                    if (coreSimpleScore < 85) totalPoints += 0.25; 
                    else if (coreSimpleScore > 95) totalPoints += 0.75; 
                    else totalPoints += 1;

                    // Trigger Phase 5 (Scored) by dispatching to the animated widget
                    window.dispatchEvent(new CustomEvent('thps-dashboard-update', { 
                        detail: { 
                            overrideGrade: overrideGrade,
                            totalPoints: totalPoints,
                            personal: personalPercent,
                            visual: visualPercent,
                            intangible: intangiblePercent,
                            wpm: avgWpm,
                            sps: mumbleScore,
                            pause: pausePercent,
                            simple: coreSimpleScore,
                            wps: avgWpsFloat,
                            grade: avgGrade,
                            time: elapsedSecs
                        } 
                    }));

                } catch (e) {
                    console.error("API Error", e);
                    window.dispatchEvent(new CustomEvent('thps-dashboard-update', { detail: { overrideGrade: true } }));
                }
            };
        });

        // STEP 5: Save, Download, and Reset
        window.addEventListener('thps-studio-save-video', () => {
            const widget = document.querySelector('thps-gameboard-animated');
            const videoEl = widget.querySelector('#studio-video');
            const camOff = widget.querySelector('#studio-cam-off');
            const recDot = widget.querySelector('#studio-rec-dot');
            
            // Stop Video Recorder (triggers auto-download)
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            
            // NOW we completely terminate the active hardware connections
            if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
            if (virtualDestNode) { virtualDestNode = null; }
            if (audioCtx && audioCtx.state !== 'closed') { audioCtx.close(); audioCtx = null; }

            if (stream) stream.getTracks().forEach(t => t.stop());
            if (displayStream) displayStream.getTracks().forEach(t => t.stop());
            
            // Reset UI
            videoEl.classList.add('hidden');
            videoEl.srcObject = null;
            camOff.classList.remove('hidden');
            recDot.classList.add('hidden');
            
            widget.setGameState('IDLE');
        });

    </script>
</body>
</html>
