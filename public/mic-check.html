<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Mic-Check: Logic Engine (V24.1 - Master Dashboard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/engines/audio-engine-headless.js"></script>
    
    <script src="https://unpkg.com/compromise@14.14.3/builds/compromise.min.js"></script>
    <script src="https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/engines/nlp-scorer.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: transparent; 
        }

        .perspective { perspective: 1200px; }
        
        .flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .flip-active { transform: rotateX(180deg); }

        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .face-front { background-color: #ffffff; border: 1px solid #e2e8f0; }
        .face-back { transform: rotateX(180deg); background-color: #f8fafc; border: 1px solid #cbd5e1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="relative w-full max-w-[368px] aspect-[9/16] max-h-[850px] bg-slate-100 rounded-[2rem] shadow-2xl flex flex-col pt-6 pb-2.5 px-2 overflow-hidden">
        
        <div class="w-full grid grid-rows-5 gap-2 shrink-0 mb-3 perspective" style="height: 55%;">
            
            <div class="w-full h-full min-h-[3rem] cursor-pointer group" id="p1-container" onclick="toggleFlip(1)">
                <div id="bar-1" class="flipper">
                    <div id="p1-front" class="face face-front"></div>
                    <div id="p1-back" class="face face-back"></div>
                </div>
            </div>

            <div class="w-full h-full min-h-[3rem] cursor-pointer group" id="p2-container" onclick="toggleFlip(2)">
                <div id="bar-2" class="flipper">
                    <div id="p2-front" class="face face-front"></div>
                    <div id="p2-back" class="face face-back"></div>
                </div>
            </div>

            <div class="w-full h-full min-h-[3rem] cursor-pointer group" id="p3-container" onclick="toggleFlip(3)">
                <div id="bar-3" class="flipper">
                    <div id="p3-front" class="face face-front"></div>
                    <div id="p3-back" class="face face-back"></div>
                </div>
            </div>

            <div class="w-full h-full min-h-[3rem] cursor-pointer group" id="p4-container" onclick="toggleFlip(4)">
                <div id="bar-4" class="flipper">
                    <div id="p4-front" class="face face-front"></div>
                    <div id="p4-back" class="face face-back"></div>
                </div>
            </div>

            <div class="w-full h-full min-h-[3rem] cursor-pointer group" id="p5-container" onclick="toggleFlip(5)">
                <div id="bar-5" class="flipper">
                    <div id="p5-front" class="face face-front overflow-hidden"></div>
                    <div id="p5-back" class="face face-back"></div>
                </div>
            </div>

        </div>

        <div class="w-full flex-grow perspective group mb-1">
            <div id="bar-6" class="flipper rounded-[1.25rem] shadow-inner transition-transform duration-700">
                
                <div id="p6-front" class="face face-front bg-slate-50 border border-slate-200 rounded-[1.25rem] p-5 flex flex-col justify-center items-center"></div>

                <div id="p6-back" class="face face-back bg-[#111827] border-gray-800 rounded-[1.25rem]">
                    <video id="camera-feed" autoplay playsinline muted class="pointer-events-none absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 z-0"></video>
                    
                    <div id="camera-trigger-area" onclick="toggleCamera();" class="absolute inset-0 z-10 cursor-pointer"></div>
                    
                    <div id="camera-status-container" class="absolute top-4 w-full pointer-events-none text-gray-500 flex flex-col items-center z-20 transition-opacity duration-500">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                        <span id="camera-status" class="text-[10px] font-bold uppercase tracking-widest mt-1">CAMERA OFF</span>
                    </div>

                    <button onclick="toggleFlip(6);" class="absolute top-3 right-3 text-slate-400 hover:text-white transition-colors z-30 p-1 cursor-pointer">
                        <i data-lucide="info" class="w-4 h-4"></i>
                    </button>

                    <div id="countdown-overlay-back" class="pointer-events-none absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm text-white text-5xl font-black opacity-0 transition-opacity duration-200 drop-shadow-2xl z-40 tracking-widest uppercase text-center leading-tight"></div>
                </div>

            </div>
        </div>

    </div>

    <div class="mt-8 flex gap-4">
        <button class="px-6 py-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-500 font-bold uppercase tracking-widest text-xs rounded-full shadow-sm transition-all active:scale-95 flex items-center gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Hub
        </button>
        <button onclick="resetGame()" class="px-6 py-2 bg-slate-300 hover:bg-slate-400 text-slate-700 font-bold uppercase tracking-widest text-xs rounded-full shadow-sm transition-all active:scale-95">
            Reset
        </button>
    </div>

    <script>
        // --- GLOBAL VARIABLES ---
        let globalShortDate = "";
        
        // --- STATE ENGINE & COLORS ---
        const col = {
            p1: 'bg-[#C06060]', textP1: 'text-[#C06060]', borderP1: 'border-[#C06060]',
            p2: 'bg-[#9333EA]', textP2: 'text-[#9333EA]', borderP2: 'border-[#9333EA]',
            p3: 'bg-[#2563EB]', textP3: 'text-[#2563EB]', borderP3: 'border-[#2563EB]',
            p4: 'bg-[#047857]', textP4: 'text-[#047857]', borderP4: 'border-[#047857]',
            p5: 'bg-[#F4B532]', textP5: 'text-[#F4B532]', borderP5: 'border-[#F4B532]',
            w: 'bg-white', textW: 'text-white', borderW: 'border-slate-200',
            b: 'bg-slate-900', textB: 'text-slate-800'
        };

        let phase = 'MENU'; 
        let activeMenuTopic = 'LOGO'; 
        let currentMenuPage = 1;

        let timerSeconds = 0;
        let timerInterval = null;
        let achievedStarStatus = 'empty'; 
        const maxDurationSeconds = 80; 
        
        let selections = { 1: 'A', 2: 'A', 3: 'A', 4: 'A' };
        
        let sideBLevel = 0; 
        let currentCategory = ''; 
        let currentSubNum = 0; 

        let isStarting = false; 
        let cameraStream = null; 
        let isCameraOn = false;
        let isCameraLoading = false; 

        let feedbackMatrix = {};
        let drillData = {}; 

        // --- P6 DYNAMIC CONTENT DICTIONARIES ---
        const p3ScoringContent = [
            "<strong>1. Delivery (Pace, Mumble, Pause):</strong><br>Scores your speed, clarity, and pacing. Green is ideal, Yellow needs adjustment, Red means you are speaking too fast, too slow, or not enunciating.",
            "<strong>2. Content (Personal, Visual, Abstract):</strong><br>Scores the balance of your story. A perfect score blends personal anecdotes, visual imagery, and abstract concepts evenly.",
            "<strong>3. Clarity (Word Avg, Eng 10K, Pop):</strong><br>Scores how easy you are to understand. Use shorter sentences and common English words to hit Green thresholds.",
            "<strong>4. Time:</strong><br>Speak for 60 to 80 seconds for max points. Anything under 20s or over 80s is disqualified so don't chicken out or ramble on!",
            "<strong>5. Stars & Final Grade:</strong><br> All 10 sub-scores combine into a Final Grade out of 10. The Star rating reflects the difficulty level you completed.",
        ];

        const p4TipsContent = [
            "<strong>Pace:</strong> Aim for 110-150 words per minute. If you speak faster, you risk overwhelming the listener. Slower, and you lose their attention.",
            "<strong>Mumble:</strong> Syllables per second (SPS). Keep it between 3.5 and 4.5. Open your mouth wider to hit those hard consonants.",
            "<strong>Pause:</strong> Aim for 15-30% pause time. Silence is powerful—use it to let your audience digest your points.",
            "<strong>Personal:</strong> Use 'I', 'Me', 'We' to build a connection. Aim for 30-60% personal pronoun density in your speeches.",
            "<strong>Visual:</strong> Paint a picture. Use descriptive, sensory words. Aim for 25-50% visual language.",
            "<strong>Abstract:</strong> Don't get lost in the clouds. Keep complex, theoretical concepts to a minimum (10-30%).",
            "<strong>Word Avg:</strong> Short sentences punch harder. Aim for 7 to 14 words per sentence. Edit out the fluff.",
            "<strong>Eng 10K:</strong> Use simple, recognizable words. Over 85% of your speech should be from the 10,000 most common English words.",
            "<strong>Pop:</strong> Readability grade level. Aim for a 5th to 10th-grade reading level to maximize mass-market appeal.",
            "<strong>Time:</strong> Don't ramble! The goal is exactly 60 seconds. Going under 20s or over 80s will penalize your grade."
        ];

        function changeMenuPage(direction, event, maxPages) {
            if (event) event.stopPropagation();
            currentMenuPage += direction;
            if (currentMenuPage < 1) currentMenuPage = maxPages;
            if (currentMenuPage > maxPages) currentMenuPage = 1;
            renderP6Front();
        }

        // --- INTERACTION LOGIC (RESULTS Phase) ---
        function revertP6ToDefault(event) {
            if (event) event.stopPropagation();
            const bar6 = document.getElementById('bar-6');
            if (bar6 && bar6.classList.contains('flip-active')) {
                // Info shake on camera mode
                const infoIcon = bar6.querySelector('.face-back button');
                if (infoIcon) {
                    infoIcon.classList.add('animate-bounce');
                    setTimeout(() => infoIcon.classList.remove('animate-bounce'), 1000);
                }
            } else {
                activeMenuTopic = 'RESULTS_DEFAULT';
                renderP6Front();
            }
        }

        function handleMetricClick(category, subNum, event) {
            if (event) event.stopPropagation();
            const bar6 = document.getElementById('bar-6');
            const isCameraShowing = bar6 && bar6.classList.contains('flip-active');

            currentCategory = category;
            currentSubNum = subNum;

            if (isCameraShowing) {
                sideBLevel = 3;
                renderSideB();
                for (let i = 1; i <= 5; i++) {
                    const bar = document.getElementById(`bar-${i}`);
                    if (bar) bar.classList.add('flip-active');
                }
            } else {
                activeMenuTopic = 'FEEDBACK_CARD';
                renderP6Front(); 
            }
        }

        // --- P6 MASTER RENDERER ---
        function renderP6Front() {
            const p6f = document.getElementById('p6-front');
            if (!p6f) return;

            const cameraIcon = `<button onclick="toggleFlip(6); event.stopPropagation();" class="absolute top-3 right-3 text-white/50 hover:text-white transition-colors z-20 p-1 cursor-pointer"><i data-lucide="video" class="w-4 h-4"></i></button>`;
            const cameraIconDark = cameraIcon.replace('text-white/50 hover:text-white', 'text-slate-400 hover:text-blue-600');

            if (activeMenuTopic === 'LOGO') {
                p6f.className = `face face-front ${col.p1} !border-gray-800 rounded-[1.25rem] p-5 flex flex-col justify-center items-center`;
                p6f.innerHTML = `
                    ${cameraIcon}
                    <div class="flex flex-col items-center justify-center text-center leading-none" style="font-family: 'Permanent Marker', cursive;">
                        <span class="text-4xl uppercase text-[#F4B532] tracking-widest drop-shadow-sm mb-1">Daily</span>
                        <span class="text-[2.1rem] uppercase text-[#F4B532] tracking-widest drop-shadow-sm mb-4">Mic-Check</span>
                    </div>
                    <span class="text-[11px] font-bold text-white uppercase tracking-widest">${globalShortDate}</span>
                `;
            } 
            else if (activeMenuTopic === 'P1') {
                p6f.className = `face face-front bg-slate-50 border border-slate-200 rounded-[1.25rem] p-5 flex flex-col justify-center items-start`;
                p6f.innerHTML = `
                    ${cameraIconDark}
                    <h3 class="text-[11px] font-black uppercase text-[#C06060] tracking-widest mb-2">What is Mic-Check?</h3>
                    <p class="text-[10px] text-slate-600 font-medium leading-relaxed pr-2">
                        Mic-check is a public speaking game by pro speakers for... not so pro speakers. A "mic-check" is when people say silly things to test a microphone. This daily game improves your speaking skills without pressure, using random topics & powerful analytics. Click <strong class="text-[#C06060]">START</strong> to "check" it out!
                    </p>
                `;
            }
            else if (activeMenuTopic === 'P2') {
                p6f.className = `face face-front bg-slate-50 border border-slate-200 rounded-[1.25rem] p-5 flex flex-col justify-center items-start`;
                p6f.innerHTML = `
                    ${cameraIconDark}
                    <h3 class="text-[11px] font-black uppercase text-[#9333EA] tracking-widest mb-2">How to Play:</h3>
                    <ol class="text-[10px] text-slate-600 space-y-1.5 font-medium pl-3 pr-2 list-decimal leading-tight">
                        <li>Select stars to increase speech difficulty.</li>
                        <li>Flip this panel to use Camera.</li>
                        <li>Press start to play.</li>
                        <li>Press stop to see scores & stats.</li>
                    </ol>
                `;
            }
            else if (activeMenuTopic === 'P3' || activeMenuTopic === 'P4') {
                const maxP = activeMenuTopic === 'P3' ? 5 : 10;
                const title = activeMenuTopic === 'P3' ? "Scoring" : "Tips";
                const titleCol = activeMenuTopic === 'P3' ? "text-[#2563EB]" : "text-[#047857]";
                const contentText = activeMenuTopic === 'P3' ? p3ScoringContent[currentMenuPage - 1] : p4TipsContent[currentMenuPage - 1];

                p6f.className = `face face-front bg-slate-50 border border-slate-200 rounded-[1.25rem] p-5 flex flex-col justify-between items-start`;
                p6f.innerHTML = `
                    ${cameraIconDark}
                    <div class="w-full flex-1 flex flex-col items-start pr-4">
                        <h3 class="text-[11px] font-black uppercase ${titleCol} tracking-widest mb-2">${title}</h3>
                        <p class="text-[10px] text-slate-600 font-medium leading-relaxed">${contentText}</p>
                    </div>
                    <div class="w-full flex items-center justify-between mt-auto border-t border-slate-200 pt-3 shrink-0">
                        <button onclick="changeMenuPage(-1, event, ${maxP})" class="p-1 hover:bg-slate-200 rounded text-slate-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <span class="text-[9px] font-bold text-slate-400 tracking-widest">${currentMenuPage} / ${maxP}</span>
                        <button onclick="changeMenuPage(1, event, ${maxP})" class="p-1 hover:bg-slate-200 rounded text-slate-400"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                `;
            }
            else if (activeMenuTopic === 'RESULTS_DEFAULT') {
                p6f.className = `face face-front ${window.lastAchievedBg} !border-gray-800 rounded-[1.25rem] p-5 flex flex-col justify-center items-center`;
                p6f.innerHTML = `
                    ${cameraIcon}
                    <div class="absolute top-2 left-1/2 -translate-x-1/2 z-50 text-[2.5rem] font-black tracking-tighter text-white drop-shadow-md pointer-events-none">
                        ${window.lastAchievedGrade}<span class="text-xl text-white/50"> / Level ${window.lastAchievedLevel}</span>
                    </div>
                    <div class="flex flex-col items-center justify-center text-center leading-none mt-8" style="font-family: 'Permanent Marker', cursive;">
                        <span class="text-4xl uppercase text-white tracking-widest drop-shadow-sm mb-1">Daily</span>
                        <span class="text-[2.1rem] uppercase text-white tracking-widest drop-shadow-sm mb-4">Mic-Check</span>
                    </div>
                    <span class="text-[11px] font-bold text-white uppercase tracking-widest">${globalShortDate}</span>
                `;
            }
            else if (activeMenuTopic === 'FEEDBACK_CARD') {
                const data = drillData[currentCategory][currentSubNum];
                const activeColor = currentCategory === 'Delivery' ? 'text-[#9333EA]' : (currentCategory === 'Content' ? 'text-[#2563EB]' : 'text-[#047857]');
                
                p6f.className = `face face-front bg-white border border-slate-200 rounded-[1.25rem] p-5 flex flex-col justify-start items-start`;
                p6f.innerHTML = `
                    <button onclick="revertP6ToDefault(event)" class="absolute top-3 right-3 text-slate-400 hover:text-slate-800 transition-colors p-1 cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
                    <h3 class="text-[11px] font-black uppercase ${activeColor} tracking-widest mb-3">${data.name}</h3>
                    <div class="space-y-3 w-full pr-1 overflow-y-auto max-h-[170px]">
                        <p class="text-[10px] text-slate-600 leading-tight"><strong class="uppercase text-[9px] tracking-widest block mb-0.5 text-slate-400">You:</strong> ${data.you}</p>
                        <p class="text-[10px] text-slate-600 leading-tight"><strong class="uppercase text-[9px] tracking-widest block mb-0.5 text-slate-400">Try:</strong> ${data.try}</p>
                        <p class="text-[10px] text-slate-600 leading-tight"><strong class="uppercase text-[9px] tracking-widest block mb-0.5 text-slate-400">Why:</strong> ${data.why}</p>
                    </div>
                `;
            }

            if (window.lucide) window.lucide.createIcons();
        }

        // --- MATH & NLP BRIDGE ---
        function scoreMetric(raw, bounds1, bounds05_low, bounds05_high) {
            if (raw >= bounds1[0] && raw <= bounds1[1]) return { points: 1, state: 'perfect' };
            if (bounds05_low && raw >= bounds05_low[0] && raw <= bounds05_low[1]) return { points: 0.5, state: 'low' };
            if (bounds05_high && raw >= bounds05_high[0] && raw <= bounds05_high[1]) return { points: 0.5, state: 'high' };
            return { points: 0, state: raw < bounds1[0] ? 'low' : 'high' };
        }

        function buildDynamicDrillData(nlpData, elapsedSecs) {
            const words = Math.max(1, nlpData.numWords);
            const activeSecs = Math.max(1, elapsedSecs);
            const wpm = Math.round((words / activeSecs) * 60);
            const pausePct = Math.round(((nlpData.reportMarkdownText.match(/[.!?]/g)?.length || 0) * 1.3 / activeSecs) * 100);
            const sps = (nlpData.totalSyllables / activeSecs).toFixed(1);
            const perPct = Math.round((nlpData.personalCount / words) * 100);
            const visPct = Math.round((nlpData.visualCount / words) * 100);
            const absPct = Math.max(0, 100 - perPct - visPct);
            const wps = Math.round(words / Math.max(1, nlpData.numSentences));
            const engPct = Math.round((nlpData.google10kCount / words) * 100);
            const grade = window.THPS.NLP.calculateReadabilityMetrics(words, nlpData.numSentences, nlpData.totalSyllables, nlpData.letterCount, nlpData.complexWordCount).avgGrade;

            let scPace = scoreMetric(wpm, [110, 150], [89, 109], [151, 171]);
            let scMumb = scoreMetric(parseFloat(sps), [3.5, 4.5], [2.9, 3.4], [4.6, 5.2]);
            let scPaus = scoreMetric(pausePct, [15, 30], [9, 14], [31, 36]);
            let scPers = scoreMetric(perPct, [30, 60], [20, 29], [61, 70]);
            let scVis = scoreMetric(visPct, [25, 50], [15, 24], [51, 60]);
            let scAbs = scoreMetric(absPct, [10, 30], [0, 9], [31, 40]);
            let scSig = scoreMetric(wps, [7, 14], [4, 6], [15, 17]);
            let scEng = scoreMetric(engPct, [85, 95], [80, 84], [96, 100]);
            let scPop = scoreMetric(grade, [5, 10], [3, 4.99], [10.01, 12]);

            const safeFb = (cat, state) => feedbackMatrix[cat] ? feedbackMatrix[cat][state] : { you: "-", try: "-", why: "-" };
            const getCol = (pts) => pts === 1 ? 'text-emerald-500' : (pts === 0.5 ? 'text-amber-500' : 'text-rose-500');

            drillData = {
                Delivery: { 2: { name: "Pace", val: `${wpm}`, color: getCol(scPace.points), ...safeFb('Pace', scPace.state) }, 3: { name: "Mumble", val: `${sps}`, color: getCol(scMumb.points), ...safeFb('Mumble', scMumb.state) }, 4: { name: "Pause", val: `${pausePct}%`, color: getCol(scPaus.points), ...safeFb('Pause', scPaus.state) } },
                Content: { 2: { name: "Personal", val: `${perPct}%`, color: getCol(scPers.points), ...safeFb('Personal', scPers.state) }, 3: { name: "Visual", val: `${visPct}%`, color: getCol(scVis.points), ...safeFb('Visual', scVis.state) }, 4: { name: "Abstract", val: `${absPct}%`, color: getCol(scAbs.points), ...safeFb('Abstract', scAbs.state) } },
                Clarity: { 2: { name: "Word Avg", val: `${wps}`, color: getCol(scSig.points), ...safeFb('Signal', scSig.state) }, 3: { name: "Eng 10K", val: `${engPct}%`, color: getCol(scEng.points), ...safeFb('Eng10k', scEng.state) }, 4: { name: "Pop", val: `~95%`, color: getCol(scPop.points), ...safeFb('Pop75', scPop.state) } },
                FinalGrade: (scPace.points + scMumb.points + scPaus.points + scPers.points + scVis.points + scAbs.points + scSig.points + scEng.points + scPop.points)
            };

            // Dynamic Extras Category
            let timeYou = elapsedSecs < 20 ? "Less than 20 sec" : (elapsedSecs < 60 ? "20 to 59s" : (elapsedSecs <= 80 ? "60 to 80s" : "More than 80s"));
            let timeWhy = elapsedSecs < 20 ? "Score invalid" : (elapsedSecs < 60 ? "Score of 0.5 / 1" : (elapsedSecs <= 80 ? "Score of +1" : "Score invalid"));
            let timeTry = (elapsedSecs >= 60 && elapsedSecs <= 80) ? "You nailed it!" : "Speaking for 60-80s";

            drillData.Extras = {
                1: { name: "Time", val: formatTime(elapsedSecs), you: timeYou, why: timeWhy, try: timeTry },
                2: { name: "Date", val: globalShortDate, you: "Should play Daily Mic-Check again tomorrow!", why: "Because every day is a new challenge!", try: "Become a member for courses & tools!" }
            };
        }

        // --- UI GENERATOR (Side A) ---
        function renderPhase() {
            for (let i = 1; i <= 5; i++) document.getElementById(`bar-${i}`).classList.remove('flip-active');

            if (phase === 'MENU') {
                const menuData = {
                    1: { title: "What is Mic-Check?", bg: col.p1, text: col.textP5 },
                    2: { title: "How to Play", bg: col.p2, text: col.textW },
                    3: { title: "Scoring", bg: col.p3, text: col.textW },
                    4: { title: "Tips", bg: col.p4, text: col.textW }
                };
                for (let i = 1; i <= 4; i++) {
                    document.getElementById(`p${i}-front`).className = `face face-front ${menuData[i].bg}`;
                    document.getElementById(`p${i}-front`).innerHTML = `<div class="w-full h-full flex items-center justify-center text-center"><span class="text-[12px] font-black uppercase tracking-widest ${menuData[i].text}">${menuData[i].title}</span></div>`;
                }
                document.getElementById('p5-front').className = `face face-front ${col.p5} cursor-pointer hover:brightness-105 transition-all`;
                document.getElementById('p5-front').innerHTML = `<div class="w-full h-full flex items-center justify-center pointer-events-auto" onclick="toggleFlip(5); event.stopPropagation();"><span class="text-[18px] font-black uppercase tracking-[0.3em] ${col.textP1}">START</span></div>`;
                renderP6Front();
            }
            else if (phase === 'START') {
                for (let i = 1; i <= 4; i++) {
                    const matrixData = matrix[i];
                    document.getElementById(`p${i}-front`).className = `face face-front ${matrixData.bgA}`;
                    document.getElementById(`p${i}-back`).className = `face face-back ${matrixData.bgB}`;
                    document.getElementById(`p${i}-front`).innerHTML = `<div class="w-full h-full flex items-center justify-start pl-5 pr-10"><span class="text-[13px] font-bold uppercase tracking-widest leading-tight"><strong class="${matrixData.colorA}">${matrixData.A}</strong></span></div><span class="absolute right-3 pointer-events-none">${matrixData.starA}</span>`;
                    document.getElementById(`p${i}-back`).innerHTML = `<div class="w-full h-full flex items-center justify-start pl-5 pr-10"><span class="text-[13px] font-bold uppercase tracking-widest leading-tight"><strong class="${matrixData.colorB}">${matrixData.B}</strong></span></div><span class="absolute right-3 pointer-events-none">${matrixData.starB}</span>`;
                }
                if(selections[1] === 'B') document.getElementById('bar-1').classList.add('flip-active');
                if(selections[2] === 'B') document.getElementById('bar-2').classList.add('flip-active');
                if(selections[3] === 'B') document.getElementById('bar-3').classList.add('flip-active');
                if(selections[4] === 'B') document.getElementById('bar-4').classList.add('flip-active');

                const fillP = (getLevelCount() / 4) * 100;
                document.getElementById('p5-front').className = `face face-front ${col.w} overflow-hidden`;
                document.getElementById('p5-front').innerHTML = `
                    <div id="p5-fill" class="absolute left-0 top-0 bottom-0 ${col.p5} transition-all duration-500 ease-out z-0" style="width: ${fillP}%;"></div>
                    <div class="relative w-full h-full z-10 flex items-center justify-center pointer-events-auto cursor-pointer active:scale-95" onclick="handleActionClick(event)">
                        <span id="p5-level-num" class="text-[16px] font-black uppercase tracking-[0.2em] text-slate-800">PLAY LEVEL ${getLevelCount() + 1}</span>
                    </div>`;
                activeMenuTopic = 'LOGO';
                renderP6Front();
            } 
            else if (phase === 'RECORDING') {
                for (let i = 1; i <= 4; i++) {
                    const txt = selections[i] === 'A' ? matrix[i].A : matrix[i].B;
                    const c = selections[i] === 'A' ? matrix[i].colorA : matrix[i].colorB;
                    const b = selections[i] === 'A' ? matrix[i].bgA : matrix[i].bgB;
                    document.getElementById(`p${i}-front`).className = `face face-front ${b}`;
                    document.getElementById(`p${i}-front`).innerHTML = `<div class="w-full h-full flex items-center justify-start pl-5 pr-10"><span class="text-[13px] font-bold uppercase tracking-widest leading-tight"><strong class="${c}">${txt}</strong></span></div>`;
                }
                document.getElementById('p5-front').className = `face face-front ${col.b} text-white`;
                document.getElementById('p5-front').innerHTML = `<div id="timer-progress" class="absolute left-0 top-0 bottom-0 w-0 bg-rose-600 transition-all duration-1000 ease-linear z-0"></div><div class="relative w-full h-full z-10 pointer-events-none flex items-center justify-center"><div class="absolute top-1/2 left-[25%] -translate-x-1/2 -translate-y-1/2">${createStar('half', 20, 'text-slate-600')}</div><div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-auto cursor-pointer p-2.5 bg-white/10 hover:bg-white/25 rounded-full backdrop-blur-sm" onclick="handleActionClick(event)">${stopSVG}</div><div class="absolute top-1/2 left-[75%] -translate-x-1/2 -translate-y-1/2">${createStar('filled', 20, 'text-slate-600')}</div></div>`;
            }
            else if (phase === 'RESULTS') {
                const totalScore = (drillData.FinalGrade + getTimeGradeAndStar(timerSeconds).num).toFixed(1);
                const timeColor = (timerSeconds < 20 || timerSeconds > 80) ? 'text-slate-400 line-through' : 'text-emerald-500';
                
                let gradeBg = 'bg-blue-500';
                if (totalScore >= 8.0 && totalScore < 10.0) gradeBg = 'bg-emerald-500';
                else if (totalScore >= 10.0) gradeBg = 'bg-[#F4B532]';

                const third = (label, val, colorClass, cat, subNum) => `
                    <div onclick="handleMetricClick('${cat}', ${subNum}, event)" class="flex flex-col items-center justify-center w-full h-full cursor-pointer hover:bg-slate-100 transition-colors">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-0.5 pointer-events-none">${label}</span>
                        <span class="text-sm font-black ${colorClass} leading-none mt-1 pointer-events-none">${val}</span>
                    </div>`;

                document.getElementById('p1-front').className = `face face-front ${col.p1}`;
                document.getElementById('p1-front').innerHTML = `<div class="w-full h-full flex items-center justify-center" onclick="revertP6ToDefault(event)"><span class="text-2xl uppercase text-[#F4B532] tracking-widest" style="font-family: 'Permanent Marker', cursive;">Daily Mic-Check</span></div>`;
                document.getElementById('p2-front').innerHTML = `<div class="w-full h-full grid grid-cols-3 divide-x divide-slate-100">${third("Pace", drillData.Delivery[2].val, drillData.Delivery[2].color, "Delivery", 2)}${third("Mumble", drillData.Delivery[3].val, drillData.Delivery[3].color, "Delivery", 3)}${third("Pause", drillData.Delivery[4].val, drillData.Delivery[4].color, "Delivery", 4)}</div>`;
                document.getElementById('p3-front').innerHTML = `<div class="w-full h-full grid grid-cols-3 divide-x divide-slate-100">${third("Personal", drillData.Content[2].val, drillData.Content[2].color, "Content", 2)}${third("Visual", drillData.Content[3].val, drillData.Content[3].color, "Content", 3)}${third("Abstract", drillData.Content[4].val, drillData.Content[4].color, "Content", 4)}</div>`;
                document.getElementById('p4-front').innerHTML = `<div class="w-full h-full grid grid-cols-3 divide-x divide-slate-100">${third("Word Avg", drillData.Clarity[2].val, drillData.Clarity[2].color, "Clarity", 2)}${third("Eng 10K", drillData.Clarity[3].val, drillData.Clarity[3].color, "Clarity", 3)}${third("Pop", drillData.Clarity[4].val, drillData.Clarity[4].color, "Clarity", 4)}</div>`;
                document.getElementById('p5-front').innerHTML = `<div class="w-full h-full grid grid-cols-3 divide-x divide-slate-100">${third("Time", drillData.Extras[1].val, timeColor, "Extras", 1)}${third("Date", globalShortDate, "text-slate-600", "Extras", 2)}<div onclick="revertP6ToDefault(event)" class="flex items-center justify-center w-full h-full cursor-pointer hover:bg-slate-100 transition-colors"><span class="text-sm font-black text-slate-800 leading-none mt-1">${totalScore}/10</span></div></div>`;

                window.lastAchievedGrade = totalScore;
                window.lastAchievedLevel = getLevelCount() + 1;
                window.lastAchievedBg = gradeBg;
                activeMenuTopic = 'RESULTS_DEFAULT';
                renderP6Front();
            }
        }

        // --- UI GENERATOR (Side B - Feedback Cards) ---
        function renderSideB() {
            const p5 = document.getElementById('p5-back');
            const data = drillData[currentCategory][currentSubNum];
            const activeColor = currentCategory === 'Delivery' ? col.textP2 : (currentCategory === 'Content' ? col.textP3 : col.textP4);

            document.getElementById('p1-back').innerHTML = `<div class="w-full h-full flex items-center justify-center"><span class="text-[13px] font-black uppercase tracking-widest ${activeColor}">${data.name}</span></div>`;
            document.getElementById('p2-back').innerHTML = `<div class="w-full h-full flex items-center justify-start pl-6 pr-6"><span class="text-[10px] font-medium leading-tight text-slate-600"><strong class="uppercase text-[9px] text-slate-400 block">You:</strong> ${data.you}</span></div>`;
            document.getElementById('p3-back').innerHTML = `<div class="w-full h-full flex items-center justify-start pl-6 pr-6"><span class="text-[10px] font-medium leading-tight text-slate-600"><strong class="uppercase text-[9px] text-slate-400 block">Try:</strong> ${data.try}</span></div>`;
            document.getElementById('p4-back').innerHTML = `<div class="w-full h-full flex items-center justify-start pl-6 pr-6"><span class="text-[10px] font-medium leading-tight text-slate-600"><strong class="uppercase text-[9px] text-slate-400 block">Why:</strong> ${data.why}</span></div>`;
            
            p5.className = `face face-back ${col.p5} cursor-pointer active:scale-95`;
            p5.innerHTML = `<div class="w-full h-full flex items-center justify-center gap-2"><i data-lucide="chevron-left" class="w-4 h-4 text-[#C06060]"></i><span class="text-[11px] font-black uppercase text-[#C06060]">Back to Grid</span></div>`;
            if (window.lucide) window.lucide.createIcons();
        }

        // --- CORE NAVIGATION ---
        function toggleFlip(panelNum) {
            if (phase === 'RECORDING' || phase === 'PROCESSING') return;
            if (panelNum === 6) {
                const bar6 = document.getElementById('bar-6');
                bar6.classList.toggle('flip-active');
                if (!bar6.classList.contains('flip-active') && isCameraOn) toggleCamera();
                return;
            }
            if (phase === 'MENU') {
                if (panelNum >= 1 && panelNum <= 4) { activeMenuTopic = 'P' + panelNum; currentMenuPage = 1; renderP6Front(); }
                else if (panelNum === 5) { phase = 'START'; renderPhase(); }
                return;
            }
            if (phase === 'START') {
                if (panelNum === 5) return;
                const bar = document.getElementById(`bar-${panelNum}`);
                bar.classList.toggle('flip-active');
                selections[panelNum] = bar.classList.contains('flip-active') ? 'B' : 'A';
                updateLevelDisplay();
            }
            else if (phase === 'RESULTS') {
                // If top panels are flipped (Feedback cards), P5 acts as "Back to Dashboard"
                if (sideBLevel === 3 && panelNum === 5) {
                    sideBLevel = 0;
                    renderPhase();
                }
            }
        }

        async function handleActionClick(event) {
            if (event) event.stopPropagation();
            if (phase === 'START') {
                if (isStarting) return; isStarting = true;
                if (window.THPS?.Audio) { if (!(await window.THPS.Audio.startRecordingProcess())) { alert("Mic required."); isStarting = false; resetGame(); return; } }
                const steps = ["3", "2", "1", "Mic-Check!"];
                for (let s of steps) {
                    document.getElementById('countdown-overlay-front').innerText = s;
                    document.getElementById('countdown-overlay-back').innerText = s;
                    document.getElementById('countdown-overlay-front').classList.remove('opacity-0');
                    document.getElementById('countdown-overlay-back').classList.remove('opacity-0');
                    await new Promise(r => setTimeout(r, 800));
                }
                document.getElementById('countdown-overlay-front').classList.add('opacity-0');
                document.getElementById('countdown-overlay-back').classList.add('opacity-0');
                isStarting = false; phase = 'RECORDING'; renderPhase(); timerSeconds = 0;
                timerInterval = setInterval(() => {
                    timerSeconds++; let p = Math.min((timerSeconds / maxDurationSeconds) * 100, 100);
                    document.getElementById('timer-progress').style.width = p + '%';
                    if (timerSeconds >= maxDurationSeconds) handleActionClick(null);
                }, 1000);
            } 
            else if (phase === 'RECORDING') {
                phase = 'PROCESSING'; clearInterval(timerInterval); renderPhase();
                if (window.THPS?.Audio) {
                    const audioData = await window.THPS.Audio.stopRecordingProcess();
                    buildDynamicDrillData(window.THPS.NLP.analyzeTranscript(audioData.transcript || "", audioData.timestamps || []), audioData.duration || 0);
                }
                phase = 'RESULTS'; sideBLevel = 0; renderPhase();
            }
        }

        function resetGame() {
            phase = 'MENU'; activeMenuTopic = 'LOGO'; currentMenuPage = 1;
            clearInterval(timerInterval); selections = { 1: 'A', 2: 'A', 3: 'A', 4: 'A' };
            initApp();
        }

        async function toggleCamera() {
            if (phase === 'RECORDING' || isCameraLoading) return;
            isCameraLoading = true;
            const videoEl = document.getElementById('camera-feed');
            if (isCameraOn) { cameraStream?.getTracks().forEach(t => t.stop()); videoEl.srcObject = null; videoEl.classList.replace('opacity-100', 'opacity-0'); isCameraOn = false; }
            else {
                try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: true }); videoEl.srcObject = cameraStream; videoEl.classList.replace('opacity-0', 'opacity-100'); isCameraOn = true; }
                catch (e) { console.error(e); }
            }
            isCameraLoading = false;
        }

        async function initApp() {
            const d = new Date(); globalShortDate = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`p${i}-front`);
                if(el) { el.className = `face face-front bg-white border-slate-200`; el.innerHTML = `<div class="animate-pulse text-[11px] text-slate-400 font-bold uppercase tracking-widest">Loading...</div>`; }
            }
            try {
                const data = await (await fetch('https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/mic-check-panels.json')).json();
                const today = new Intl.DateTimeFormat('en-CA', { timeZone: 'Australia/Adelaide', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
                if (data[today]) { b1 = data[today].p1; b2 = `${data[today].p2} about`; b3 = `${data[today].p3}, with`; b4 = `${data[today].p4} examples.`; }
                feedbackMatrix = await (await fetch('https://raw.githack.com/THPS-Hendrick/Speech-analyzer/main/feedback-matrix.json')).json();
                if (window.THPS?.NLP) await window.THPS.NLP.loadDictionaries();
            } catch (e) { console.warn(e); }
            renderPhase();
        }
        initApp();
    </script>
</body>
</html>
